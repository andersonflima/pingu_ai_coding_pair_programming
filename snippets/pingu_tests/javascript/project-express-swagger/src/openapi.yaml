openapi: 3.0.3
info:
  title: Pingu JavaScript API
  version: 1.0.0
  description: API de exemplo para validar fluxo de sugestões do Pingu.
servers:
  - url: http://localhost:3000
paths:
  /health:
    get:
      summary: Status da API
      responses:
        '200':
          description: Serviço ativo
  /users:
    get:
      summary: Lista usuários
      responses:
        '200':
          description: Lista recuperada
    post:
      summary: Cria usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        '201':
          description: Usuário criado
