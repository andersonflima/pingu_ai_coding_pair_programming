name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vim runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y elixir neovim vim

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install Doppler CLI (optional)
        if: env.DOPPLER_TOKEN != ''
        run: |
          curl -Ls https://cli.doppler.com/install.sh | sh
          echo "$HOME/.doppler/bin" >> "$GITHUB_PATH"

      - name: Run Vim smoke
        run: |
          if [ -n "${DOPPLER_TOKEN:-}" ]; then
            doppler run -- npm run smoke:vim
          else
            npm run smoke:vim
          fi

      - name: Run checks
        run: |
          if [ -n "${DOPPLER_TOKEN:-}" ]; then
            doppler run -- npm run check
          else
            npm run check
          fi

      - name: Validate npm package contents
        run: |
          if [ -n "${DOPPLER_TOKEN:-}" ]; then
            doppler run -- npm run pack:check
          else
            npm run pack:check
          fi

      - name: Validate release version is persisted
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "${DOPPLER_TOKEN:-}" ]; then
            doppler run -- npm run release:check
          else
            npm run release:check
          fi
          git diff --exit-code package.json package-lock.json CHANGELOG.md

