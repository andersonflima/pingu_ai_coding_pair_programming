name: ci

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install Vim runtimes
        run: |
          sudo apt-get update
          sudo apt-get install -y elixir neovim vim

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Vim smoke
        run: npm run smoke:vim

      - name: Run checks
        run: npm run check

      - name: Validate npm package contents
        run: npm run pack:check
