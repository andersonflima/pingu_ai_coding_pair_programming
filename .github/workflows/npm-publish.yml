name: npm-publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: Modo de bump de versão (patch|minor|major)
        required: false
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set release bump mode
        if: github.event_name == 'workflow_dispatch'
        run: echo "RELEASE_BUMP=${{ github.event.inputs.bump || 'patch' }}" >> "$GITHUB_ENV"

      - name: Update npm CLI
        run: npm install -g npm@latest

      - name: Install Elixir runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y elixir

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Validate release candidate
        run: npm run ci:release

      - name: Persist bumped version
        id: persist-bump
        run: |
          if [[ -z "$(git status --porcelain package.json package-lock.json CHANGELOG.md)" ]]; then
            echo "release_version_bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): bump package version for npm publish [skip ci]"
          git push
          echo "release_version_bumped=true" >> "$GITHUB_OUTPUT"
          current_version=$(node -p "require('./package.json').version")
          echo "release_version=${current_version}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm with Trusted Publisher
        if: env.HAS_NPM_TOKEN != 'true'
        run: npm publish --access public

      - name: Publish to npm with token
        if: env.HAS_NPM_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
